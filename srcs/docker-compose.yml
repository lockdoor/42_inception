version: '3.1'

services:
  
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx
    container_name: nginx
    depends_on:
      - wordpress
      - adminer
    restart: always
    volumes:
      - ./data/wordpress:/var/www/html
    ports:
      - 443:443
    networks:
      - app
    env_file:
      - .env

  wordpress:
    build: 
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress
    container_name: wordpress
    depends_on:
      - mariadb
      - redis
    restart: always
    volumes:
      - ./data/wordpress:/var/www/html
    networks:
      - app
    env_file:
      - .env

  redis:
    build: 
      context: ./requirements/bonus/redis
      dockerfile: Dockerfile
    image: redis
    container_name: redis
    depends_on:
      - mariadb
    restart: always
    networks:
      - app
    
  adminer:
    build: 
      context: ./requirements/bonus/adminer
      dockerfile: Dockerfile
    image: adminer
    container_name: adminer
    restart: always
    networks:
      - app

  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb
    container_name: mariadb
    restart: always
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - app
    env_file:
      - .env
  
  ftp:
    build:
      context: ./requirements/bonus/ftp
      dockerfile: Dockerfile
    image: ftp
    container_name: ftp
    restart: always
    volumes: 
      - ./data/wordpress:/var/www/html
    ports:
      - 21:21
      - 21100-21110:21100-21110
    networks:
      - app
    env_file:
      - .env

  monitoring:
    image: nicolargo/glances:latest
    container_name: glances
    pid: host
    restart: always
    ports:
      - 61208-61209:61208-61209
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/user/1000/podman/podman.sock:/run/user/1000/podman/podman.sock:ro
    environment:
      - GLANCES_OPT=-w
    networks:
      - app

networks:
  app:
